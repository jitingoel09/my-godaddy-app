    <script>
      // Performance monitoring for LCP, CLS, and INP
      try {
        new PerformanceObserver((entryList) => {
          for (const entry of entryList.getEntries()) {
            console.log('[Performance] LCP:', entry.startTime, entry);
          }
        }).observe({type: 'largest-contentful-paint', buffered: true});

        let clsValue = 0;
        new PerformanceObserver((entryList) => {
          for (const entry of entryList.getEntries()) {
            if (!entry.hadRecentInput) {
              clsValue += entry.value;
              console.log('[Performance] Cumulative Layout Shift (CLS):', clsValue);
            }
          }
        }).observe({type: 'layout-shift', buffered: true});

        // Track and log Interaction to Next Paint (INP) candidates
        let maxInteractionDuration = 0;
        new PerformanceObserver((entryList) => {
          for (const entry of entryList.getEntries()) {
            if (entry.interactionId) {
              if (entry.duration > maxInteractionDuration) {
                maxInteractionDuration = entry.duration;
                let rating = 'good';
                if (maxInteractionDuration > 500) {
                  rating = 'poor';
                } else if (maxInteractionDuration > 200) {
                  rating = 'needs-improvement';
                }
                console.log(
                  `[Performance] Interaction to Next Paint (INP): ${maxInteractionDuration}ms (${rating})`,
                  entry
                );
              }
            }
          }
        }).observe({type: 'event', buffered: true});
      } catch (e) {
        console.warn('PerformanceObserver or requested event types are not fully supported.');
      }
